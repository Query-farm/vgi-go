# Pre-commit hooks for vgi-go.
# Install: pip install pre-commit && pre-commit install
# Run on all files: pre-commit run --all-files
repos:
  - repo: local
    hooks:
      - id: gofmt
        name: gofmt
        entry: gofmt
        args: ["-l", "-w"]
        language: system
        types: [go]
        pass_filenames: true

      - id: go-vet
        name: go vet
        entry: bash -c 'go vet ./...'
        language: system
        types: [go]
        pass_filenames: false

      - id: go-build
        name: go build
        entry: bash -c 'go build ./...'
        language: system
        types: [go]
        pass_filenames: false

      - id: golangci-lint
        name: golangci-lint
        entry: bash -c 'command -v golangci-lint >/dev/null && golangci-lint run ./... || echo "(skipped: golangci-lint not installed)"'
        language: system
        types: [go]
        pass_filenames: false
