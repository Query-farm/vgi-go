name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ['1.24']

    steps:
      - uses: actions/checkout@v4

      - name: Checkout vgi-rpc-go
        uses: actions/checkout@v4
        with:
          repository: Query-farm/vgi-rpc-go
          path: ../vgi-rpc-go
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Verify dependencies
        run: go mod verify

      - name: Check formatting
        run: test -z "$(gofmt -l .)"

      - name: Vet
        run: make vet

      - name: Build
        run: make build

      - name: Test
        run: go test ./...
